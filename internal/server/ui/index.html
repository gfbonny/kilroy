          html += '<div style="margin-top:2px"><span style="color:#4b5563;font-size:10px">INPUTS</span>'
          html += '<div style="display:flex;flex-direction:column;gap:1px;margin-top:1px">'
          Object.entries(run.inputs).forEach(([k, v]) => {
            html += '<div><span style="color:#9ca3af">' + esc(k) + '</span>=<span style="color:#d1d5db">' + esc(String(v)) + '</span></div>'
          })
          html += '</div></div>'
        }

        // Labels
        if (run.labels && Object.keys(run.labels).length) {
          html += '<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:2px">'
          html += Object.entries(run.labels).map(([k, v]) =>
            '<span class="label-tag">' + esc(k) + '=' + esc(v) + '</span>').join('')
          html += '</div>'
        }

        // Invocation (startup command)
        if (run.invocation_json) {
          const inv = Array.isArray(run.invocation_json) ? run.invocation_json : []
          if (inv.length) {
            html += '<div style="margin-top:2px"><span style="color:#4b5563;font-size:10px">INVOCATION</span>'
            html += '<div style="color:#9ca3af;font-family:monospace;font-size:10px;word-break:break-all;margin-top:1px">' + esc(inv.join(' ')) + '</div></div>'
          }
        }

        // Config
        if (run.config_json) {
          const cfg = typeof run.config_json === 'string' ? run.config_json : JSON.stringify(run.config_json, null, 2)
          html += '<details style="margin-top:2px"><summary style="color:#4b5563;font-size:10px;cursor:pointer">CONFIG</summary>'
          html += '<pre style="color:#9ca3af;font-size:10px;white-space:pre-wrap;word-break:break-all;margin:2px 0 0;max-height:200px;overflow-y:auto">' + esc(cfg) + '</pre></details>'
        }

        html += '</div>'
        el.innerHTML = html
      }

      // ── Center: DOT graph ──

      async function renderGraph() {
        if (!run || destroyed) return
        const area = document.getElementById('graph-area')

        if (!run.dot_source) {
          area.innerHTML = '<div class="graph-placeholder">No DOT graph available</div>'
          return
        }

        // Build node status map from execution data
        const nodeStatuses = {}
        const nodeList = run.nodes || nodes
        nodeList.forEach(n => { if (n.node_id) nodeStatuses[n.node_id] = nodeStatus(n) })

        const selectedNodeId = selectedNode !== null && nodeList[selectedNode]
          ? nodeList[selectedNode].node_id : null

        const svgEl = await GraphRenderer.render(
          run.dot_source, nodeStatuses, selectedNodeId,
          (nodeId) => {
            // Find the node index by node_id
            let idx = nodeList.findIndex(n => n.node_id === nodeId)
            if (idx < 0) {
              // Unexecuted node — add a synthetic entry so the panel can display it
              nodeList.push({ node_id: nodeId, status: 'unexecuted', handler_type: '', synthetic: true })
              idx = nodeList.length - 1
            }
            selectNode(idx)
          }
        )

        area.innerHTML = ''
        area.appendChild(svgEl)
      }

      // ── Node selection ──

      function renderRunLogEntries(events) {
        return events.map(e => {
          const ts = e.ts ? new Date(e.ts).toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit', fractionalSecondDigits: 3 }) : ''
          const srcCls = e.source === 'tool' ? 'log-event-tool' : e.source === 'agent' ? 'log-event-agent' : e.source === 'git' ? 'log-event-git' : 'log-event-engine'
          const msgCls = e.level === 'error' ? 'log-msg-error' : e.level === 'warn' ? 'log-msg-warn' : ''
          return '<div class="log-entry">' +
            '<span class="log-ts">' + esc(ts) + '</span>' +
            '<span class="log-event ' + srcCls + '">' + esc(e.event || '') + '</span>' +
            (e.node ? '<span class="log-node">' + esc(e.node) + '</span>' : '<span class="log-node"></span>') +
            '<span class="log-msg ' + msgCls + '" title="' + esc(e.msg || '') + '">' + esc(e.msg || '') + '</span>' +
            '</div>'
        }).join('')
      }

      let runLogCount = 0

      async function showRunLog() {
        stopLogPoll()
        selectedNode = -1
        renderSidebar()
        renderGraph()
        const panel = document.getElementById('detail-panel')
        panel.style.display = 'block'
        panel.innerHTML = '<div class="panel-resize-handle" id="panel-resize"></div>' +
          '<div class="panel-header"><span style="font-weight:600;font-size:13px">Run Log</span>' +
          '<button class="panel-close" id="close-panel">×</button></div>' +
          '<div id="panel-body"><div class="loading" style="padding:12px">Loading…</div></div>'

        // Resize handle drag
        const resizeHandle = document.getElementById('panel-resize')
        resizeHandle.addEventListener('mousedown', (e) => {
          e.preventDefault()
          resizeHandle.classList.add('dragging')
          const startX = e.clientX
          const startWidth = panel.offsetWidth
          const onMove = (ev) => {
            const newWidth = Math.max(280, Math.min(800, startWidth + (startX - ev.clientX)))
            panel.style.width = newWidth + 'px'
          }
          const onUp = () => {
            resizeHandle.classList.remove('dragging')
            document.removeEventListener('mousemove', onMove)
            document.removeEventListener('mouseup', onUp)
          }
          document.addEventListener('mousemove', onMove)
          document.addEventListener('mouseup', onUp)
        })

        document.getElementById('close-panel').addEventListener('click', () => {
          stopLogPoll(); selectedNode = null; renderSidebar(); panel.style.display = 'none'
        })

        const params = logFilter.source ? { source: logFilter.source } : {}
        const data = await API.getLog(runId, params)
        const body = document.getElementById('panel-body')

        if (!data || !data.events || !data.events.length) {
          body.innerHTML = '<div style="color:#4b5563;font-size:11px;padding:8px">No log data available</div>'
          if (!isTerminal(runStatus())) {
            logPollTimer = setInterval(() => showRunLog(), 3000)
          }
          return
        }

        runLogCount = data.count

        const sources = [...new Set(data.events.map(e => e.source).filter(Boolean))]
        let html = '<div class="log-filters">'
        html += '<span style="font-size:10px;color:#4b5563" id="log-count">' + data.count + ' events</span>'
        html += '<button class="log-filter-btn ' + (!logFilter.source ? 'active' : '') + '" data-source="">All</button>'
        sources.forEach(s => {
          html += '<button class="log-filter-btn ' + (logFilter.source === s ? 'active' : '') + '" data-source="' + esc(s) + '">' + esc(s) + '</button>'
        })
        html += '</div><div id="log-scroll" style="flex:1;min-height:0;overflow-y:auto">'
        html += renderRunLogEntries(data.events)
        html += '</div>'
        body.innerHTML = html

        body.querySelectorAll('.log-filter-btn').forEach(btn => {
          btn.addEventListener('click', () => { logFilter.source = btn.dataset.source || null; showRunLog() })
        })
        body.querySelectorAll('.log-msg').forEach(el => {
          el.addEventListener('click', () => el.classList.toggle('expanded'))
        })

        const scroll = document.getElementById('log-scroll')
        if (scroll) scroll.scrollTop = scroll.scrollHeight

        // Poll for new events on running runs
        if (!isTerminal(runStatus())) {
          logPollTimer = setInterval(async () => {
            const fresh = await API.getLog(runId, params)
            if (!fresh || fresh.count <= runLogCount) return
            const newEvents = fresh.events.slice(runLogCount)
            runLogCount = fresh.count
            const countEl = document.getElementById('log-count')
            if (countEl) countEl.textContent = fresh.count + ' events'
            const scrollEl = document.getElementById('log-scroll')
            if (scrollEl && newEvents.length) {
              const wasAtBottom = scrollEl.scrollTop + scrollEl.clientHeight >= scrollEl.scrollHeight - 20
              scrollEl.insertAdjacentHTML('beforeend', renderRunLogEntries(newEvents))
              scrollEl.querySelectorAll('.log-msg:not([data-click])').forEach(el => {
                el.setAttribute('data-click', '1')
                el.addEventListener('click', () => el.classList.toggle('expanded'))
              })
              if (wasAtBottom) scrollEl.scrollTop = scrollEl.scrollHeight
            }
          }, 3000)
        }
      }

      function selectNode(idx) {
        stopLogPoll()
        selectedNode = idx
        panelTab = 'info'
        fileBrowsePath = ''
        logFilter.source = null
        renderSidebar()
        renderGraph()
        renderPanel()
      }

      // ── Right panel: node detail ──

      function renderPanel() {
        const panel = document.getElementById('detail-panel')
        const nodeList = run?.nodes || nodes

        if (selectedNode === null || !nodeList[selectedNode]) {
          panel.style.display = 'none'
          return
        }

        panel.style.display = 'block'
        const n = nodeList[selectedNode]
        const isAgent = n.handler_type === 'agent'
        const showDetail = n.handler_type && n.handler_type !== 'start'

        // Tabs: Info, Detail, Diff, Log, Files, Outputs
        const tabs = ['info']
        if (n.synthetic) {
          // Unexecuted nodes only show Info
        } else {
          if (showDetail) tabs.push('detail')
          tabs.push('diff')
          tabs.push('log')
          tabs.push('files')
          if (outputs?.outputs?.length) tabs.push('outputs')
        }

        let html = `
          <div class="panel-header">
            <span style="font-weight:600;font-size:13px">${esc(n.node_id)}</span>
            <button class="panel-close" id="close-panel">×</button>
          </div>`

        if (tabs.length > 1) {
          html += '<div class="panel-tabs">' + tabs.map(t =>
            '<button class="panel-tab ' + (panelTab === t ? 'active' : '') + '" data-tab="' + t + '">' +
            t.charAt(0).toUpperCase() + t.slice(1) + '</button>'
          ).join('') + '</div>'
        }

        html += '<div id="panel-body"></div>'
        panel.innerHTML = '<div class="panel-resize-handle" id="panel-resize"></div>' + html

        // Resize handle drag
        const resizeHandle = document.getElementById('panel-resize')
        resizeHandle.addEventListener('mousedown', (e) => {
          e.preventDefault()
          resizeHandle.classList.add('dragging')
          const startX = e.clientX
          const startWidth = panel.offsetWidth
          const onMove = (ev) => {
            const newWidth = Math.max(280, Math.min(800, startWidth + (startX - ev.clientX)))
            panel.style.width = newWidth + 'px'
          }
          const onUp = () => {
            resizeHandle.classList.remove('dragging')
            document.removeEventListener('mousemove', onMove)
            document.removeEventListener('mouseup', onUp)
          }
          document.addEventListener('mousemove', onMove)
          document.addEventListener('mouseup', onUp)
        })

        document.getElementById('close-panel').addEventListener('click', () => {
          stopLogPoll(); selectedNode = null; renderSidebar(); renderGraph(); panel.style.display = 'none'
        })

        panel.querySelectorAll('.panel-tab').forEach(tab => {
          tab.addEventListener('click', () => { panelTab = tab.dataset.tab; renderPanel() })
        })

        if (panelTab === 'info') renderPanelInfo(n)
        else if (panelTab === 'detail') renderPanelTurns(n)
        else if (panelTab === 'diff') renderPanelDiff(n)
        else if (panelTab === 'log') renderPanelLog(n)
        else if (panelTab === 'files') renderPanelFiles(n)
        else if (panelTab === 'outputs') renderPanelOutputs()
      }

      // Parse edges from DOT source for nodes not in the API edges array
      function parseDotEdges(nodeId) {
        const dot = run?.dot_source || ''
        const edges = []
        const re = /^\s*(\w+)\s*->\s*(\w+)(?:\s*\[([^\]]*)\])?/gm
        let m
        while ((m = re.exec(dot)) !== null) {
          if (m[1] === nodeId || m[2] === nodeId) {
            const attrs = m[3] || ''
            const condMatch = attrs.match(/condition="([^"]*)"/)
            edges.push({ from_node: m[1], to_node: m[2], condition: condMatch ? condMatch[1] : '' })
          }
        }
        return edges
      }

      function renderPanelInfo(n) {
        const body = document.getElementById('panel-body')

        // Find edges involving this node — use API edges, fall back to DOT parsing
        const apiEdges = run?.edges || []
        let inEdge = apiEdges.find(e => e.to_node === n.node_id)
        let outEdge = apiEdges.find(e => e.from_node === n.node_id)

        if (!inEdge || !outEdge) {
          const dotEdges = parseDotEdges(n.node_id)
          if (!inEdge) inEdge = dotEdges.find(e => e.to_node === n.node_id && e.condition)
            || dotEdges.find(e => e.to_node === n.node_id)
          if (!outEdge) outEdge = dotEdges.find(e => e.from_node === n.node_id && e.condition)
            || dotEdges.find(e => e.from_node === n.node_id)
        }

        let edgeHtml = ''
        const isUnexecuted = n.synthetic || n.status === 'unexecuted'
        if (inEdge) {
          if (inEdge.condition) {
            const label = isUnexecuted ? 'Reachable when' : 'Routed by'
            edgeHtml += `<div class="panel-section"><div class="panel-label">${label}</div><div class="panel-value" style="color:#60a5fa">${esc(inEdge.condition)} <span style="color:#4b5563">from ${esc(inEdge.from_node)}</span></div></div>`
          } else {
            edgeHtml += `<div class="panel-section"><div class="panel-label">Follows</div><div class="panel-value">${esc(inEdge.from_node)}</div></div>`
          }
        }
        if (outEdge) {
          let routeText = esc(outEdge.to_node)
          if (outEdge.condition) routeText += ' <span style="color:#60a5fa">(' + esc(outEdge.condition) + ')</span>'
          if (outEdge.reason && outEdge.reason !== 'only_edge') routeText += ' <span style="color:#4b5563">[' + esc(outEdge.reason) + ']</span>'
          edgeHtml += `<div class="panel-section"><div class="panel-label">${isUnexecuted ? 'Routes to' : 'Routed to'}</div><div class="panel-value">${routeText}</div></div>`
        }

        body.innerHTML = `
          <div class="panel-section">
            <div class="panel-label">Status</div>
            <div class="panel-value">${statusIcon(nodeStatus(n))} ${esc(nodeStatus(n))}</div>
          </div>
          ${n.handler_type ? `<div class="panel-section"><div class="panel-label">Type</div><div class="panel-value">${esc(n.handler_type)}</div></div>` : ''}
          ${n.started_at ? `<div class="panel-section"><div class="panel-label">Started</div><div class="panel-value">${esc(new Date(n.started_at).toLocaleString())}</div></div>` : ''}
          ${n.completed_at ? `<div class="panel-section"><div class="panel-label">Completed</div><div class="panel-value">${esc(new Date(n.completed_at).toLocaleString())}</div></div>` : ''}
          ${n.duration_ms ? `<div class="panel-section"><div class="panel-label">Duration</div><div class="panel-value">${formatDuration(n.duration_ms)}</div></div>` : ''}
          ${n.attempt > 1 ? `<div class="panel-section"><div class="panel-label">Attempt</div><div class="panel-value">${n.attempt}</div></div>` : ''}
          ${edgeHtml}
          ${n.failure_reason ? `<div class="panel-section"><div class="panel-label">Failure</div><div class="panel-error">${esc(n.failure_reason)}</div></div>` : ''}
          ${n.failure_class ? `<div class="panel-section"><div class="panel-label">Failure Class</div><div class="panel-value">${esc(n.failure_class)}</div></div>` : ''}
          ${n.notes ? `<div class="panel-section"><div class="panel-label">Notes</div><div class="panel-value">${esc(n.notes)}</div></div>` : ''}
        `
      }

      async function renderPanelTurns(n) {
        const body = document.getElementById('panel-body')
        body.innerHTML = '<div class="loading" style="padding:12px">Loading…</div>'
        const data = await loadTurns(n.node_id, n.attempt)

        if (!data) {
          body.innerHTML = '<div style="color:#4b5563;font-size:11px;padding:8px">No data available for this node</div>'
          return
        }

        let html = ''
        // Iteration badge at the top when this node has multiple attempts.
        const nodeList = run?.nodes || nodes
        const attempts = nodeList.filter(x => x.node_id === n.node_id)
        if (attempts.length > 1) {
          html += '<div style="margin-bottom:12px;padding:6px 8px;background:#111118;border:1px solid #1e1e2e;border-radius:4px;font-size:11px;color:#a78bfa">'
          html += '↻ Iteration ' + (n.attempt || 1) + ' of ' + attempts.length
          html += '</div>'
        }

        // Agent nodes: prompt + response
        if (data.prompt) {
          html += '<div class="turn"><div class="turn-role turn-role-user">Prompt</div>' +
            '<div class="turn-text">' + esc(data.prompt) + '</div></div>'
        }
        if (data.response) {
          html += '<div class="turn"><div class="turn-role turn-role-assistant">Response</div>' +
            '<div class="turn-text">' + esc(data.response) + '</div></div>'
        }

        // Tool invocation: show the command that ran.
        if (data.tool_invocation && data.tool_invocation.command) {
          html += '<div class="turn"><div class="turn-role" style="color:#f59e0b">command</div>' +
            '<div class="turn-tool"><div class="turn-tool-output" style="max-height:200px;color:#d1d5db">' +
            esc(data.tool_invocation.command) + '</div></div></div>'
        }
        // Captured tool scripts (files referenced by the command).
        if (Array.isArray(data.scripts) && data.scripts.length > 0) {
          for (const script of data.scripts) {
            html += '<div class="turn"><div class="turn-role" style="color:#a78bfa">script: ' + esc(script.name) + '</div>' +
              '<div class="turn-tool"><div class="turn-tool-output" style="max-height:300px;color:#d1d5db">' +
              esc(script.content) + '</div></div></div>'
          }
        }

        // Tool nodes: stdout + stderr
        if (data.stdout) {
          html += '<div class="turn"><div class="turn-role" style="color:#22c55e">stdout</div>' +
            '<div class="turn-tool"><div class="turn-tool-output" style="max-height:300px">' + esc(data.stdout) + '</div></div></div>'
        }
        if (data.stderr) {
          html += '<div class="turn"><div class="turn-role" style="color:#ef4444">stderr</div>' +
            '<div class="turn-tool"><div class="turn-tool-output" style="max-height:300px">' + esc(data.stderr) + '</div></div></div>'
        }

        // Status block (context_updates, outcome, etc.)
        if (data.status && typeof data.status === 'object') {
          const s = data.status
          const statusParts = []
          if (s.outcome) statusParts.push('<div><span class="panel-label">Outcome</span><div class="panel-value">' + esc(s.outcome) + '</div></div>')
          if (s.exit_code !== undefined && s.exit_code !== null) statusParts.push('<div><span class="panel-label">Exit Code</span><div class="panel-value">' + s.exit_code + '</div></div>')
          if (s.context_updates && Object.keys(s.context_updates).length) {
            const filtered = Object.entries(s.context_updates).filter(([k]) => k !== 'tool.output')
            if (filtered.length) {
              statusParts.push('<div><span class="panel-label">Context Updates</span>' +
                '<div style="font-size:11px;margin-top:4px">' +
                filtered.map(([k, v]) => '<div style="color:#9ca3af;padding:1px 0"><span style="color:#60a5fa">' +
                  esc(k) + '</span> = ' + esc(String(v).slice(0, 200)) + '</div>').join('') +
                '</div></div>')
            }
          }
          if (statusParts.length) {
            html += '<div style="margin-top:8px;padding-top:8px;border-top:1px solid #1e1e2e">' + statusParts.join('') + '</div>'
          }
        }

        // Timing
        if (data.timing) {
          html += '<div style="margin-top:8px;padding-top:8px;border-top:1px solid #1e1e2e;font-size:10px;color:#4b5563">'
          if (data.timing.wall_ms) html += 'Wall: ' + formatDuration(data.timing.wall_ms) + ' '
          if (data.timing.user_ms) html += '· User: ' + formatDuration(data.timing.user_ms) + ' '
          if (data.timing.sys_ms) html += '· Sys: ' + formatDuration(data.timing.sys_ms)
          html += '</div>'
        }

        if (!html) {
          html = '<div style="color:#4b5563;font-size:11px;padding:8px">No turns data recorded for this node</div>'
        }

        body.innerHTML = html
      }

      // ── Diff tab ──

      async function renderPanelDiff(n) {
        const body = document.getElementById('panel-body')
        body.innerHTML = '<div class="loading" style="padding:12px">Loading diff…</div>'
        const data = await API.getNodeDiff(runId, n.node_id)

        if (!data || data.error) {
          body.innerHTML = '<div style="color:#4b5563;font-size:11px;padding:8px">' +
            (data?.error || 'No diff data for this node') + '</div>'
          return
        }

        let html = ''

        // Summary
        if (data.summary) {
          const s = data.summary
          html += '<div class="diff-summary">' +
            '<span>' + (s.files_changed || 0) + ' file' + (s.files_changed !== 1 ? 's' : '') + '</span>' +
            '<span class="diff-stat-add">+' + (s.insertions || 0) + '</span>' +
            '<span class="diff-stat-del">-' + (s.deletions || 0) + '</span>' +
            '</div>'
        }

        // Per-file list
        if (data.files && data.files.length) {
          html += '<div style="margin-bottom:8px">'
          data.files.forEach(f => {
            const statusCls = f.status === 'added' ? 'diff-file-added' :
              f.status === 'deleted' ? 'diff-file-deleted' : 'diff-file-modified'
            html += '<div class="diff-file">' +
              '<span class="diff-file-status ' + statusCls + '">' + esc(f.status) + '</span>' +
              '<span style="color:#d1d5db">' + esc(f.path) + '</span>' +
              '<span style="margin-left:auto;font-size:10px;color:#4b5563">' +
                (f.insertions ? '<span class="diff-stat-add">+' + f.insertions + '</span> ' : '') +
                (f.deletions ? '<span class="diff-stat-del">-' + f.deletions + '</span>' : '') +
              '</span></div>'
          })
          html += '</div>'
        }

        // Unified diff with syntax highlighting
        if (data.diff) {
          html += '<div class="diff-content">'
          data.diff.split('\n').forEach(line => {
            if (line.startsWith('+++') || line.startsWith('---')) {
              html += '<span style="color:#6b7280">' + esc(line) + '</span>\n'
            } else if (line.startsWith('@@')) {
              html += '<span class="diff-hunk">' + esc(line) + '</span>\n'
            } else if (line.startsWith('+')) {
              html += '<span class="diff-add">' + esc(line) + '</span>\n'
            } else if (line.startsWith('-')) {
              html += '<span class="diff-del">' + esc(line) + '</span>\n'
            } else if (line.startsWith('diff ')) {
              html += '<span style="color:#60a5fa;font-weight:600">' + esc(line) + '</span>\n'
            } else {
              html += esc(line) + '\n'
            }
          })
          html += '</div>'
        }

        // SHAs
        if (data.before_sha || data.after_sha) {
          html += '<div style="margin-top:8px;font-size:10px;color:#4b5563">'
          if (data.before_sha) html += 'Before: ' + esc(data.before_sha.slice(0, 8)) + ' '
          if (data.after_sha) html += 'After: ' + esc(data.after_sha.slice(0, 8))
          html += '</div>'
        }

        const noChanges = data.summary && (data.summary.files_changed || 0) === 0 && (!data.files || data.files.length === 0)
        if (noChanges) {
          body.innerHTML = '<div style="color:#4b5563;font-size:11px;padding:8px">No tracked file changes' +
            '<br><span style="font-size:10px">Writes to .kilroy/ are gitignored</span></div>'
        } else {
          body.innerHTML = html || '<div style="color:#4b5563;font-size:11px;padding:8px">No changes</div>'
        }
      }

      // ── Log tab ──

      let logFilter = { source: null }
      let logPollTimer = null

      function stopLogPoll() {
        if (logPollTimer) { clearInterval(logPollTimer); logPollTimer = null }
      }

      function renderLogEntries(events) {
        return events.map(e => {
          const ts = e.ts ? new Date(e.ts).toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit', fractionalSecondDigits: 3 }) : ''
          const srcCls = e.source === 'tool' ? 'log-event-tool' : e.source === 'agent' ? 'log-event-agent' : e.source === 'git' ? 'log-event-git' : 'log-event-engine'
          const msgCls = e.level === 'error' ? 'log-msg-error' : e.level === 'warn' ? 'log-msg-warn' : ''
          const event = e.event || ''
          return '<div class="log-entry">' +
            '<span class="log-ts">' + esc(ts) + '</span>' +
            '<span class="log-event ' + srcCls + '">' + esc(event) + '</span>' +
            '<span class="log-msg ' + msgCls + '" title="' + esc(e.msg || '') + '">' + esc(e.msg || '') + '</span>' +
            '</div>'
        }).join('')
      }

      let panelLogCount = 0

      async function renderPanelLog(n) {
        stopLogPoll()
        const body = document.getElementById('panel-body')

        const params = { node: n.node_id }
        if (logFilter.source) params.source = logFilter.source
        const data = await API.getLog(runId, params)

        if (!data || !data.events || !data.events.length) {
          body.innerHTML = '<div style="color:#4b5563;font-size:11px;padding:8px">' +
            (data === null ? 'Log endpoint not available' : 'No log events for this node') + '</div>'
          // Still poll if running — events may arrive later
          if (!isTerminal(runStatus())) {
            logPollTimer = setInterval(() => renderPanelLog(n), 3000)
          }
          return
        }

        panelLogCount = data.count

        // Filters
        const sources = [...new Set(data.events.map(e => e.source).filter(Boolean))]
        let html = '<div class="log-filters">'
        html += '<span style="font-size:10px;color:#4b5563" id="log-count">' + data.count + ' events</span>'
        html += '<button class="log-filter-btn ' + (!logFilter.source ? 'active' : '') + '" data-source="">All</button>'
        sources.forEach(s => {
          html += '<button class="log-filter-btn ' + (logFilter.source === s ? 'active' : '') + '" data-source="' + esc(s) + '">' + esc(s) + '</button>'
        })
        html += '</div>'

        html += '<div id="log-scroll" style="flex:1;min-height:0;overflow-y:auto">'
        html += renderLogEntries(data.events)
        html += '</div>'

        body.innerHTML = html

        body.querySelectorAll('.log-filter-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            logFilter.source = btn.dataset.source || null
            renderPanelLog(n)
          })
        })
        body.querySelectorAll('.log-msg').forEach(el => {
          el.addEventListener('click', () => el.classList.toggle('expanded'))
        })

        // Auto-scroll to bottom
        const scroll = document.getElementById('log-scroll')
        if (scroll) scroll.scrollTop = scroll.scrollHeight

        // Poll for new events on running runs
        if (!isTerminal(runStatus())) {
          logPollTimer = setInterval(async () => {
            const fresh = await API.getLog(runId, params)
            if (!fresh || fresh.count <= panelLogCount) return
            // Append only new events
            const newEvents = fresh.events.slice(panelLogCount)
            panelLogCount = fresh.count
            const countEl = document.getElementById('log-count')
            if (countEl) countEl.textContent = fresh.count + ' events'
            const scrollEl = document.getElementById('log-scroll')
            if (scrollEl && newEvents.length) {
              const wasAtBottom = scrollEl.scrollTop + scrollEl.clientHeight >= scrollEl.scrollHeight - 20
              scrollEl.insertAdjacentHTML('beforeend', renderLogEntries(newEvents))
              scrollEl.querySelectorAll('.log-msg:not([data-click])').forEach(el => {
                el.setAttribute('data-click', '1')
                el.addEventListener('click', () => el.classList.toggle('expanded'))
              })
              if (wasAtBottom) scrollEl.scrollTop = scrollEl.scrollHeight
            }
          }, 3000)
        }
      }

      // ── Files tab ──

      let fileBrowsePath = ''

      async function renderPanelFiles(n) {
        const body = document.getElementById('panel-body')
        const basePath = n.node_id
        const fullPath = fileBrowsePath ? basePath + '/' + fileBrowsePath : basePath

        body.innerHTML = '<div class="loading" style="padding:12px">Loading…</div>'
        const data = await API.listFiles(runId, fullPath)

        if (!data) {
          body.innerHTML = '<div style="color:#4b5563;font-size:11px;padding:8px">Unable to browse files</div>'
          return
        }

        // If it's a file, show content
        if (data.isFile) {
          renderFileContent(body, data.content, fileBrowsePath)
          return
        }

        let html = ''

        // Breadcrumb
        const parts = fileBrowsePath.split('/').filter(Boolean)
        html += '<div class="file-breadcrumb">'
        html += '<a data-browse="">/' + esc(n.node_id) + '</a>'
        parts.forEach((p, i) => {
          const subPath = parts.slice(0, i + 1).join('/')
          html += ' / <a data-browse="' + esc(subPath) + '">' + esc(p) + '</a>'
        })
        html += '</div>'

        // File listing
        const files = data.files || []
        if (!files.length) {
          html += '<div style="color:#4b5563;font-size:11px">Empty directory</div>'
        } else {
          // Directories first, then files
          const dirs = files.filter(f => f.is_dir).sort((a, b) => a.name.localeCompare(b.name))
          const regular = files.filter(f => !f.is_dir).sort((a, b) => a.name.localeCompare(b.name))
          ;[...dirs, ...regular].forEach(f => {
            const subPath = fileBrowsePath ? fileBrowsePath + '/' + f.name : f.name
            html += '<div class="file-entry" data-browse="' + esc(subPath) + '">' +
              '<span class="file-icon">' + (f.is_dir ? '📁' : '📄') + '</span>' +
              '<span class="file-name">' + esc(f.name) + '</span>' +
              (f.is_dir ? '' : '<span class="file-size">' + formatBytes(f.size) + '</span>') +
              '</div>'
          })
        }

        body.innerHTML = html
        body.querySelectorAll('[data-browse]').forEach(el => {
          el.addEventListener('click', () => {
            fileBrowsePath = el.dataset.browse
            renderPanelFiles(n)
          })
        })
      }

      function renderFileContent(body, content, filename) {
        const ext = filename.split('.').pop()
        body.innerHTML = '<div class="file-breadcrumb">' +
          '<a id="file-back" style="cursor:pointer">← back</a>' +
          ' <span style="color:#d1d5db">' + esc(filename) + '</span>' +
          '</div>' +
          '<div class="file-content">' + esc(content) + '</div>'
        document.getElementById('file-back').addEventListener('click', () => {
          // Go up one level
          const parts = fileBrowsePath.split('/').filter(Boolean)
          parts.pop()
          fileBrowsePath = parts.join('/')
          const nodeList = run?.nodes || nodes
          if (nodeList[selectedNode]) renderPanelFiles(nodeList[selectedNode])
        })
      }

      let previewingOutput = null

      function renderPanelOutputs() {
        const body = document.getElementById('panel-body')
        if (!outputs?.outputs?.length) {
          body.innerHTML = '<div style="color:#4b5563;font-size:11px;padding:8px">No outputs</div>'
          return
        }
        body.innerHTML = outputs.outputs.map(o => `
          <div class="output-item" data-name="${esc(o.name)}" data-found="${o.found}">
            <span class="${o.found ? 'output-found' : 'output-missing'}">${o.found ? '●' : '○'}</span>
            <span class="output-name">${esc(o.name)}</span>
            ${o.size_bytes ? '<span class="output-size">' + formatBytes(o.size_bytes) + '</span>' : ''}
          </div>
        `).join('') + '<div id="output-preview-area"></div>'

        body.querySelectorAll('.output-item[data-found="true"]').forEach(item => {
          item.addEventListener('click', () => {
            const name = item.dataset.name
            if (previewingOutput === name) { previewingOutput = null; renderOutputPreview(); return }
            previewingOutput = name
            renderOutputPreview()
          })
        })

        if (previewingOutput) renderOutputPreview()
      }

      async function renderOutputPreview() {
        const area = document.getElementById('output-preview-area')
        if (!area) return
        if (!previewingOutput) { area.innerHTML = ''; return }
        area.innerHTML = '<div class="loading" style="padding:8px;font-size:11px">Loading…</div>'
        const content = await API.getOutputContent(runId, previewingOutput)
        if (!content) { area.innerHTML = '<div style="color:#ef4444;font-size:11px;padding:8px">Failed to load</div>'; return }
        area.innerHTML = '<div class="output-preview">' + esc(content) + '</div>'
      }

      // ── Polling refresh for non-terminal runs ──

      let pollTimer = null

      function startPolling() {
        if (pollTimer) return
        pollTimer = setInterval(async () => {
          if (destroyed) return
          try {
            const updated = await API.getRun(runId)
            run = updated
            if (updated.nodes) nodes = updated.nodes
            renderHeader()
            renderSidebar()
            renderGraph()
            renderSidebarInfo()
            if (isTerminal(runStatus())) {
              clearInterval(pollTimer)
              pollTimer = null
              updateSSEStatus('done')
              loadOutputs()
            }
          } catch {}
        }, 5000)
      }

      // ── Boot ──

      loadRun()

      return {
        destroy() {
          destroyed = true
          if (eventSource) { eventSource.close(); eventSource = null }
          if (pollTimer) { clearInterval(pollTimer); pollTimer = null }
        }
      }
    }

    // ── Boot ─────────────────────────────────────────────────
    Router.init()
  </script>
</body>
</html>
