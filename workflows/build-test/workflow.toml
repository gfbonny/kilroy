name = "build-test"
description = "Detect build system, build, test, and report results. Pure Layer 0 — no LLM involvement."
version = "1.0.0"

[[inputs]]
name = "build_command"
description = "Override the auto-detected build command"
required = false

[[inputs]]
name = "test_command"
description = "Override the auto-detected test command"
required = false

[defaults]
labels = { workflow = "build-test", layer = "0" }

outputs = ["build-report.json"]
